<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おかいものサポート</title>
    <!-- PDF生成用ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Budget Setup Screen -->
        <div id="setup-screen" class="screen_active">
            <div class="glass-card setup-card">
                <h1>おかいものサポート</h1>
                <p class="subtitle">きょうは いくら つかいますか？</p>
                <div class="input-group">
                    <span class="currency">¥</span>
                    <input type="number" id="budget-input" placeholder="1000" inputmode="numeric" />
                </div>
                <button id="start-btn" class="btn-primary">おかいものを はじめる</button>
            </div>
        </div>

        <!-- Main Dashboard Screen -->
        <div id="main-screen" class="screen_hidden">
            <!-- Header section with status -->
            <header class="glass-header">
                <div class="status-panel">
                    <div class="stat-box">
                        <span class="stat-label">よさん</span>
                        <span class="stat-value" id="disp-budget">¥0</span>
                    </div>
                    <div class="stat-box highlight">
                        <span class="stat-label">いまの ごうけい</span>
                        <span class="stat-value" id="disp-total">¥0</span>
                    </div>
                    <div class="stat-box balance-box" id="balance-container">
                        <span class="stat-label">のこり</span>
                        <span class="stat-value" id="disp-balance">¥0</span>
                    </div>
                </div>
            </header>

            <!-- Action Bar -->
            <div class="actions-bar">
                <button id="download-pdf-btn" class="btn-outline">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    PDFでほぞんする
                </button>
            </div>

            <!-- Item List area (This area will be exported to PDF) -->
            <main class="item-list-container" id="pdf-content-area">
                <ul id="item-list" class="item-list">
                    <!-- Items will be injected here via JS -->
                </ul>
            </main>

            <!-- Floating Action Button for Camera -->
            <div class="fab-container">
                <label for="camera-input" class="fab-button">
                    <svg class="camera-icon" xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z">
                        </path>
                        <circle cx="12" cy="13" r="3"></circle>
                    </svg>
                    <span>しゃしんをとる</span>
                </label>
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden-input">
            </div>
        </div>

        <!-- Price Input Modal -->
        <div id="price-modal" class="modal_hidden">
            <div class="glass-modal">
                <h2>これは いくら？</h2>
                <div class="photo-preview-container">
                    <img id="preview-image" src="" alt="商品の写真">
                </div>
                <div class="input-group modal-input">
                    <span class="currency">¥</span>
                    <input type="number" id="price-input" placeholder="100" inputmode="numeric" />
                </div>
                <div class="modal-actions">
                    <button id="cancel-item-btn" class="btn-secondary">やめる</button>
                    <button id="add-item-btn" class="btn-primary">ついかする</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker registered with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
    <script src="script.js"></script>
</body>

</html>
